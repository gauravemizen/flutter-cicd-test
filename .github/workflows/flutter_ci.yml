name: Flutter CI/CD

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.35.4"

      - name: Install dependencies
        run: flutter pub get

      - name: Restore Keystore
        run: |
          mkdir -p android/app/keystore
          echo "${{ secrets.ANDROID_KEYSTORE }}" | base64 --decode > android/app/keystore/upload-keystore.jks

      - name: Create key.properties
        run: |
          echo "storePassword=${{ secrets.KEYSTORE_PASSWORD }}" > android/key.properties
          echo "keyPassword=${{ secrets.KEY_PASSWORD }}" >> android/key.properties
          echo "keyAlias=${{ secrets.KEY_ALIAS }}" >> android/key.properties
          echo "storeFile=keystore/upload-keystore.jks" >> android/key.properties

      - name: Increment versionCode
        run: |
          VERSION=$(grep 'version:' pubspec.yaml | awk '{print $2}')
          NAME=$(echo $VERSION | cut -d'+' -f1)
          CODE=$(echo $VERSION | cut -d'+' -f2)
          NEW_CODE=$((CODE+1))
          sed -i "s/$VERSION/$NAME+$NEW_CODE/" pubspec.yaml

      - name: Generate release notes
        run: |
          git log -1 --pretty=format:"%h - %s" > release_notes.txt

      - name: Build Android AppBundle
        run: flutter build appbundle

      - name: Upload to Play Store Internal Testing
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_STORE_JSON_KEY }}
          packageName: com.emizen.flutter_cicd_test
          releaseFiles: build/app/outputs/bundle/release/app-release.aab
          track: internal
          releaseNotes: release_notes.txt